<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nonogram Game</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧩</text></svg>">
</head>
<body>

<header>
    <h1>🧩 Nonogram Puzzle Game</h1>
    <p>A logic puzzle game — fill in the grid using the clues!</p>
</header>

<main>
    <h2>Choose a Puzzle</h2>

    <div class="puzzle-list">
        <div class="puzzle-card" th:each="puzzle : ${puzzles}">

            <img th:src="@{/static/images/puzzle.png}" alt="Puzzle icon" width="80"/>

            <!-- title not name -->
            <h3 th:text="${puzzle.title}">Puzzle Title</h3>

            <!-- niveau not difficulty -->
            <p>
                <span th:if="${puzzle.niveau == 'FACILE'}">⭐ Facile</span>
                <span th:if="${puzzle.niveau == 'MOYEN'}">⭐⭐ Moyen</span>
                <span th:if="${puzzle.niveau == 'DIFFICILE'}">⭐⭐⭐ Difficile</span>
            </p>

            <p th:text="'Grid: ' + ${puzzle.gridSize} + ' x ' + ${puzzle.gridSize}"></p>

            <a th:href="@{/play/{id}(id=${puzzle.id})}" class="btn">Play Now</a>
        </div>
    </div>
</main>

<footer>
    <p>Game Development - 2025/2026</p>
</footer>

</body>
</html>
